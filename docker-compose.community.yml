# ─────────────────────────────────────────────────────────────────────────────
# ZenCoParent — Community edition  (standalone, aucun prérequis local)
# Single-tenant · SQLite · sans services externes
#
# Usage — un seul fichier suffit, pas besoin de cloner le dépôt :
#
#   curl -O https://raw.githubusercontent.com/frenchtux/ZenCoParent/main/docker-compose.community.yml
#   docker compose -f docker-compose.community.yml up -d
#   # Ouvrir http://localhost
#
# Les sources sont clonées depuis GitHub au moment du premier build.
# Pour mettre à jour vers la dernière version :
#   docker compose -f docker-compose.community.yml build --no-cache && \
#   docker compose -f docker-compose.community.yml up -d
#
# Pour tout effacer et repartir de zéro :
#   docker compose -f docker-compose.community.yml down -v
#
# ⚠  Changer APP_SECRET, JWT_SECRET et CSRF_SECRET avant tout usage réel.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── nginx ─────────────────────────────────────────────────────────────────────
  # Config baked dans l'image — aucun fichier local requis.
  nginx:
    build:
      context: "https://github.com/frenchtux/ZenCoParent.git#main:docker/nginx"
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - php
    volumes:
      - app_code:/var/www/html:ro
    networks:
      - zenco_net

  # ── php-fpm ───────────────────────────────────────────────────────────────────
  # Sources clonées depuis GitHub ; migrations SQLite lancées au démarrage.
  php:
    build:
      context: "https://github.com/frenchtux/ZenCoParent.git#main"
      dockerfile: docker/php/Dockerfile.community
    restart: unless-stopped
    volumes:
      - app_code:/var/www/html
      - zenco_storage:/var/www/html/storage
    environment:
      APP_NAME: ZenCoParent
      APP_ENV: production
      APP_MODE: community
      # ⚠ Changer ces secrets avant tout usage avec de vraies données.
      APP_SECRET: "change-me-to-a-long-random-secret-min-32-chars!!"
      APP_URL: "http://localhost"
      APP_DEBUG: "false"
      DB_CONNECTION: sqlite
      DB_FILE: /var/www/html/storage/database.sqlite
      JWT_SECRET: "change-me-to-another-long-random-jwt-secret-min-32!!"
      JWT_EXPIRY: "3600"
      JWT_REFRESH_EXPIRY: "2592000"
      CSRF_SECRET: "change-me-csrf-secret-xxxxxxxxxxxxxxxxxxxxxxxxxxx"
      STORAGE_PATH: /var/www/html/storage
      STORAGE_URL: "http://localhost/storage"
      RATE_LIMIT_REQUESTS: "60"
      RATE_LIMIT_WINDOW: "60"
      # ── Email / SMTP transactionnel ──────────────────────────────────────────
      # Laisser MAIL_HOST vide pour désactiver l'envoi d'e-mails.
      # Exemples : Mailtrap (sandbox.smtp.mailtrap.io:2525),
      #            Resend (smtp.resend.com:465), Gmail (smtp.gmail.com:587)
      MAIL_HOST: ""
      MAIL_PORT: "587"
      MAIL_ENCRYPTION: "tls"
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      MAIL_FROM_ADDRESS: "noreply@zencoparent.com"
      MAIL_FROM_NAME: "ZenCoParent"
    networks:
      - zenco_net

networks:
  zenco_net:
    driver: bridge

volumes:
  # Peuplé depuis l'image PHP au premier démarrage ; nginx le monte en lecture seule.
  app_code:
  # Stockage persistant : base SQLite + fichiers uploadés.
  zenco_storage:
