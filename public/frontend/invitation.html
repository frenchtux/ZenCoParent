<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZenCoParent — Rejoindre une famille</title>
  <link rel="stylesheet" href="/frontend/css/design-system.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      background: var(--color-bg);
      overflow: hidden;
    }

    .login-panel-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-12);
      background: linear-gradient(160deg, #3D5F52 0%, #2A4539 100%);
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E"),
        linear-gradient(160deg, #3D5F52 0%, #2A4539 100%);
      background-size: 256px 256px, cover;
      position: relative;
      overflow: hidden;
    }

    .login-panel-left::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }

    .login-panel-left::after {
      content: '';
      position: absolute;
      bottom: -60px; left: -60px;
      width: 240px; height: 240px;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
    }

    .login-illustration {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-8);
      z-index: 1;
      text-align: center;
    }

    .login-logo-icon {
      width: 72px; height: 72px;
      border-radius: var(--radius-xl);
      background: rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.18);
    }

    .login-logo-icon svg { width: 36px; height: 36px; color: rgba(255,255,255,0.9); }

    .login-app-name {
      font-family: var(--font-display);
      font-size: 3.5rem;
      font-weight: var(--font-light);
      color: #FFFFFF;
      line-height: 1;
      letter-spacing: -0.01em;
    }

    .login-tagline {
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
      max-width: 340px;
    }

    .login-panel-right {
      width: 500px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-8);
      background: var(--color-bg);
      overflow-y: auto;
    }

    .login-form-wrapper { width: 100%; max-width: 400px; }

    .login-form-title {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      font-weight: var(--font-medium);
      color: var(--color-text);
      margin-bottom: var(--space-2);
    }

    .login-form-sub {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      margin-bottom: var(--space-8);
      line-height: 1.6;
    }

    .invitation-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      margin-bottom: var(--space-8);
      line-height: 1.7;
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }

    .invitation-card strong { color: var(--color-text); }

    .invitation-card .role-badge {
      display: inline-block;
      padding: 2px 10px;
      background: var(--color-primary-bg, rgba(61,95,82,0.12));
      color: var(--color-primary);
      border-radius: 999px;
      font-size: var(--text-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-left: 4px;
    }

    .login-form { display: flex; flex-direction: column; gap: var(--space-5); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }

    .login-submit-btn {
      width: 100%;
      padding: 0.75rem 1.5rem;
      font-size: var(--text-base);
      border-radius: var(--radius-lg);
      margin-top: var(--space-2);
    }

    .login-footer-note {
      margin-top: var(--space-6);
      text-align: center;
      font-size: var(--text-xs);
      color: var(--color-text-light);
      line-height: 1.7;
    }

    .login-footer-note a { color: var(--color-primary); text-decoration: none; }
    .login-footer-note a:hover { text-decoration: underline; }

    .login-error-banner {
      display: none;
      padding: var(--space-3) var(--space-4);
      background: var(--color-error-bg);
      border: 1px solid var(--color-error);
      border-radius: var(--radius-md);
      color: var(--color-error);
      font-size: var(--text-sm);
      margin-bottom: var(--space-6);
    }

    .login-error-banner.visible { display: block; }

    #loading-state {
      text-align: center;
      color: var(--color-text-muted);
      padding: var(--space-8) 0;
      font-size: var(--text-sm);
    }

    #form-section { display: none; }

    @media (max-width: 900px) {
      body { flex-direction: column; overflow: auto; }
      .login-panel-left { flex: none; min-height: 200px; padding: var(--space-8); }
      .login-app-name { font-size: var(--text-3xl); }
      .login-panel-right { width: 100%; padding: var(--space-6); }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- Left illustration panel -->
  <aside class="login-panel-left" aria-hidden="true">
    <div class="login-illustration">
      <div class="login-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.3" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
        </svg>
      </div>
      <h1 class="login-app-name">ZenCoParent</h1>
      <p class="login-tagline">Rejoignez votre famille sur la plateforme de co-parentalité sereine.</p>
    </div>
  </aside>

  <!-- Right form panel -->
  <main class="login-panel-right">
    <div class="login-form-wrapper">
      <div id="loading-state">Chargement de l'invitation...</div>

      <div id="error-state" style="display:none;">
        <h2 class="login-form-title">Invitation invalide</h2>
        <div class="login-error-banner visible" id="error-state-msg"></div>
        <p class="login-footer-note">
          <a href="/frontend/index.html">Se connecter</a> si vous avez déjà un compte.
        </p>
      </div>

      <div id="form-section">
        <h2 class="login-form-title">Rejoindre la famille</h2>
        <div class="invitation-card" id="invite-info"></div>

        <div class="login-error-banner" id="reg-error" role="alert"></div>

        <form class="login-form" id="accept-form" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label required" for="first_name">Prénom</label>
              <input class="form-input" type="text" id="first_name" placeholder="Alice" autocomplete="given-name" required />
              <span class="form-error hidden" id="first-name-error"></span>
            </div>
            <div class="form-group">
              <label class="form-label required" for="last_name">Nom</label>
              <input class="form-input" type="text" id="last_name" placeholder="Martin" autocomplete="family-name" required />
              <span class="form-error hidden" id="last-name-error"></span>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label required" for="password">Mot de passe</label>
            <input class="form-input" type="password" id="password" placeholder="Au moins 8 caractères" autocomplete="new-password" required />
            <span class="form-error hidden" id="password-error"></span>
          </div>

          <div class="form-group">
            <label class="form-label required" for="password_confirm">Confirmer le mot de passe</label>
            <input class="form-input" type="password" id="password_confirm" placeholder="••••••••" autocomplete="new-password" required />
            <span class="form-error hidden" id="confirm-error"></span>
          </div>

          <button type="submit" class="btn btn-primary login-submit-btn" id="accept-btn">
            Rejoindre la famille
          </button>
        </form>

        <p class="login-footer-note">
          Déjà un compte ? <a href="/frontend/index.html">Se connecter</a>
        </p>
      </div>
    </div>
  </main>

  <script src="/frontend/js/api.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const token  = params.get('token');

      const loadingEl   = document.getElementById('loading-state');
      const errorEl     = document.getElementById('error-state');
      const errorMsgEl  = document.getElementById('error-state-msg');
      const formSection = document.getElementById('form-section');
      const inviteInfo  = document.getElementById('invite-info');
      const errorBanner = document.getElementById('reg-error');
      const form        = document.getElementById('accept-form');
      const btn         = document.getElementById('accept-btn');

      function showError(msg) {
        loadingEl.style.display    = 'none';
        formSection.style.display  = 'none';
        errorEl.style.display      = 'block';
        errorMsgEl.textContent     = msg;
      }

      function showForm(data) {
        loadingEl.style.display   = 'none';
        errorEl.style.display     = 'none';
        formSection.style.display = 'block';

        const roleLabel = data.role === 'child' ? 'enfant' : 'co-parent';
        inviteInfo.innerHTML = `Vous avez été invité(e) à rejoindre la famille
          <strong>${escHtml(data.tenant_name || '')}</strong>
          en tant que <span class="role-badge">${escHtml(roleLabel)}</span>.
          <br/>E-mail : <strong>${escHtml(data.email)}</strong>`;
      }

      function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      if (!token) { showError("Lien d'invitation manquant ou invalide."); return; }

      // Load invitation
      api.get('/invitations/' + token)
        .then(res => {
          if (res && res.success && res.data) {
            showForm(res.data);
          } else {
            showError("Invitation introuvable.");
          }
        })
        .catch(err => {
          if (err.status === 404) {
            showError("Cette invitation n'existe pas.");
          } else if (err.data && err.data.error) {
            showError(err.data.error);
          } else {
            showError(err.message || "Invitation invalide ou expirée.");
          }
        });

      // Form submission
      function clearErrors() {
        document.querySelectorAll('.form-error').forEach(el => { el.textContent = ''; el.classList.add('hidden'); });
        document.querySelectorAll('.form-input').forEach(el => el.classList.remove('error'));
        errorBanner.textContent = '';
        errorBanner.classList.remove('visible');
      }

      function showFieldError(fieldId, errorId, message) {
        const field = document.getElementById(fieldId);
        const errorEl = document.getElementById(errorId);
        if (field) field.classList.add('error');
        if (errorEl) { errorEl.textContent = message; errorEl.classList.remove('hidden'); }
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        clearErrors();

        const firstName = document.getElementById('first_name').value.trim();
        const lastName  = document.getElementById('last_name').value.trim();
        const password  = document.getElementById('password').value;
        const confirm   = document.getElementById('password_confirm').value;

        let hasError = false;

        if (!firstName) { showFieldError('first_name', 'first-name-error', 'Le prénom est requis.'); hasError = true; }
        if (!lastName)  { showFieldError('last_name',  'last-name-error',  'Le nom est requis.');    hasError = true; }
        if (!password) {
          showFieldError('password', 'password-error', 'Le mot de passe est requis.'); hasError = true;
        } else if (password.length < 8) {
          showFieldError('password', 'password-error', 'Minimum 8 caractères.'); hasError = true;
        }
        if (!confirm) {
          showFieldError('password_confirm', 'confirm-error', 'Confirmez votre mot de passe.'); hasError = true;
        } else if (password !== confirm) {
          showFieldError('password_confirm', 'confirm-error', 'Les mots de passe ne correspondent pas.'); hasError = true;
        }

        if (hasError) return;

        btn.classList.add('loading');
        btn.disabled = true;

        try {
          const result = await api.post('/invitations/' + token + '/accept', {
            first_name: firstName,
            last_name:  lastName,
            password,
          });

          if (result && result.success && result.data && result.data.user) {
            sessionStorage.setItem('zenco_user', JSON.stringify(result.data.user));
            window.location.href = '/frontend/dashboard.html';
          } else {
            errorBanner.textContent = "Erreur lors de l'acceptation de l'invitation.";
            errorBanner.classList.add('visible');
          }
        } catch (err) {
          const msg = (err.data && err.data.error) || err.message || "Une erreur est survenue.";
          errorBanner.textContent = msg;
          errorBanner.classList.add('visible');
        } finally {
          btn.classList.remove('loading');
          btn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
