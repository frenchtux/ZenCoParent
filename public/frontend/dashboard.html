<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZenCoParent — Tableau de bord</title>
  <link rel="stylesheet" href="/frontend/css/design-system.css" />
  <link rel="stylesheet" href="/frontend/css/layout.css" />
  <link rel="stylesheet" href="/frontend/css/components.css" />
</head>
<body>

<div id="app-shell" class="app-shell">
  <!-- Sidebar injected by nav.js -->
  <div class="main-content">
    <div class="page-header">
      <div class="page-header-left">
        <h1 class="page-title" id="page-greeting">Tableau de bord</h1>
        <p class="page-subtitle" id="page-date"></p>
      </div>
    </div>
    <div class="page-body">
      <!-- Stat cards -->
      <div class="grid-4" id="stat-cards">
        <div class="stat-card">
          <div class="stat-card-icon primary">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>
          </div>
          <div class="stat-card-content">
            <div class="stat-card-value" id="stat-children">—</div>
            <div class="stat-card-label">Enfants</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon accent">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" /></svg>
          </div>
          <div class="stat-card-content">
            <div class="stat-card-value" id="stat-events">—</div>
            <div class="stat-card-label">Événements ce mois</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon info">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z" /></svg>
          </div>
          <div class="stat-card-content">
            <div class="stat-card-value" id="stat-messages">—</div>
            <div class="stat-card-label">Messages non lus</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon success">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z" /></svg>
          </div>
          <div class="stat-card-content">
            <div class="stat-card-value" id="stat-expenses">—</div>
            <div class="stat-card-label">Dépenses du mois</div>
          </div>
        </div>
      </div>

      <!-- Two-column below -->
      <div class="grid-2" style="margin-top: var(--space-8);">
        <!-- Upcoming events -->
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Prochains événements</h2>
            <a href="/frontend/calendrier.html" class="btn btn-ghost btn-sm">Voir tout</a>
          </div>
          <div class="card-body" id="upcoming-events-list">
            <div class="loading-state"><div class="spinner"></div><span>Chargement...</span></div>
          </div>
        </div>

        <!-- Recent expenses -->
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Dépenses récentes</h2>
            <a href="/frontend/depenses.html" class="btn btn-ghost btn-sm">Voir tout</a>
          </div>
          <div class="card-body" id="recent-expenses-list">
            <div class="loading-state"><div class="spinner"></div><span>Chargement...</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="/frontend/js/api.js"></script>
<script src="/frontend/js/auth.js"></script>
<script src="/frontend/js/ui.js"></script>
<script src="/frontend/js/nav.js"></script>
<script src="/frontend/js/inviter.js"></script>
<script>
(async function () {
  const user = await requireAuth();
  if (!user) return;

  renderNav('dashboard.html');

  // Greeting & date
  const now = new Date();
  const hour = now.getHours();
  let greeting = 'Bonsoir';
  if (hour < 12) greeting = 'Bonjour';
  else if (hour < 18) greeting = 'Bon après-midi';
  document.getElementById('page-greeting').textContent =
    `${greeting}, ${user.first_name || user.email} !`;
  document.getElementById('page-date').textContent = now.toLocaleDateString('fr-FR', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });

  // Today ISO for event fetch
  const today = new Date();
  const monthStart = new Date(today.getFullYear(), today.getMonth(), 1)
    .toISOString().slice(0, 10);
  const monthEnd = new Date(today.getFullYear(), today.getMonth() + 1, 0)
    .toISOString().slice(0, 10);
  const todayStr = today.toISOString().slice(0, 10);

  // Fetch all data in parallel
  const [childrenRes, eventsMonthRes, upcomingRes, threadsRes, expensesRes] = await Promise.allSettled([
    api.get('/children'),
    api.get(`/events?from=${monthStart}&to=${monthEnd}`),
    api.get(`/events?from=${todayStr}`),
    api.get('/threads'),
    api.get('/expenses'),
  ]);

  // Children count
  const children = childrenRes.status === 'fulfilled' && childrenRes.value
    ? (childrenRes.value.data || childrenRes.value || [])
    : [];
  document.getElementById('stat-children').textContent = Array.isArray(children) ? children.length : 0;

  // Events this month count
  const eventsMonth = eventsMonthRes.status === 'fulfilled' && eventsMonthRes.value
    ? (eventsMonthRes.value.data || eventsMonthRes.value || [])
    : [];
  document.getElementById('stat-events').textContent = Array.isArray(eventsMonth) ? eventsMonth.length : 0;

  // Unread messages
  const threads = threadsRes.status === 'fulfilled' && threadsRes.value
    ? (threadsRes.value.data || threadsRes.value || [])
    : [];
  let unreadCount = 0;
  if (Array.isArray(threads)) {
    threads.forEach(t => { unreadCount += (t.unread_count || 0); });
  }
  document.getElementById('stat-messages').textContent = unreadCount;

  // Expenses this month
  const allExpenses = expensesRes.status === 'fulfilled' && expensesRes.value
    ? (expensesRes.value.data || expensesRes.value || [])
    : [];
  let monthTotal = 0;
  if (Array.isArray(allExpenses)) {
    allExpenses.forEach(e => {
      const d = e.date || e.created_at || '';
      if (d >= monthStart && d <= monthEnd + 'T') {
        monthTotal += parseFloat(e.amount || 0);
      }
    });
  }
  document.getElementById('stat-expenses').textContent = formatAmount(monthTotal);

  // Upcoming events list (next 5)
  const upcomingEvents = upcomingRes.status === 'fulfilled' && upcomingRes.value
    ? (upcomingRes.value.data || upcomingRes.value || [])
    : [];

  const upcomingEl = document.getElementById('upcoming-events-list');
  if (!Array.isArray(upcomingEvents) || upcomingEvents.length === 0) {
    showEmpty(upcomingEl, 'Aucun événement à venir', 'Ajoutez des événements dans le calendrier.',
      `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="28" height="28"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" /></svg>`
    );
  } else {
    const slice = upcomingEvents.slice(0, 5);
    upcomingEl.innerHTML = slice.map(ev => {
      const dateStr = ev.start_at || ev.start_date || ev.date || '';
      const dayNum  = dateStr ? new Date(dateStr).getDate() : '?';
      const monAbbr = dateStr ? new Date(dateStr).toLocaleDateString('fr-FR', { month: 'short' }) : '';
      const typeKey = (ev.type || 'autre').toLowerCase();
      return `
        <div class="upcoming-event-item">
          <div class="upcoming-event-date-block">
            <div class="upcoming-event-day">${dayNum}</div>
            <div class="upcoming-event-month">${monAbbr}</div>
          </div>
          <div class="upcoming-event-content">
            <div class="upcoming-event-title">${escapeHtml(ev.title || 'Sans titre')}</div>
            <div class="upcoming-event-sub">
              <span class="badge badge-sm event-badge-${typeKey}">${escapeHtml(eventTypeLabel(typeKey))}</span>
              ${(ev.start_time || (ev.start_at && ev.start_at.length > 10 ? ev.start_at.slice(11, 16) : '')) ? `<span style="margin-left:6px;font-size:var(--text-xs);color:var(--color-text-muted)">${escapeHtml(ev.start_time || ev.start_at.slice(11, 16))}</span>` : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  // Recent expenses list (last 5)
  const recentEl = document.getElementById('recent-expenses-list');
  const sortedExpenses = Array.isArray(allExpenses)
    ? [...allExpenses].sort((a, b) => {
        const da = a.date || a.created_at || '';
        const db = b.date || b.created_at || '';
        return db.localeCompare(da);
      }).slice(0, 5)
    : [];

  if (sortedExpenses.length === 0) {
    showEmpty(recentEl, 'Aucune dépense', 'Commencez à enregistrer vos dépenses partagées.',
      `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="28" height="28"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z" /></svg>`
    );
  } else {
    recentEl.innerHTML = sortedExpenses.map(exp => {
      const catKey = (exp.category || 'autre').toLowerCase();
      return `
        <div class="upcoming-event-item" style="border-bottom: 1px solid var(--color-border-light); padding: var(--space-3) 0;">
          <div style="flex:1; min-width:0;">
            <div style="font-size:var(--text-sm);font-weight:var(--font-medium);color:var(--color-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(exp.description || 'Dépense')}</div>
            <div style="margin-top:2px;">
              <span class="badge expense-badge-${catKey}">${escapeHtml(expenseCategoryLabel(catKey))}</span>
              <span style="margin-left:6px;font-size:var(--text-xs);color:var(--color-text-muted)">${formatDate(exp.date || exp.created_at || '')}</span>
            </div>
          </div>
          <div style="font-family:var(--font-display);font-size:var(--text-md);font-weight:var(--font-semibold);color:var(--color-text);flex-shrink:0;margin-left:var(--space-4);">
            ${formatAmount(exp.amount)}
          </div>
        </div>
      `;
    }).join('');
  }
})();
</script>
</body>
</html>
