<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZenCoParent — Messagerie</title>
  <link rel="stylesheet" href="/frontend/css/design-system.css" />
  <link rel="stylesheet" href="/frontend/css/layout.css" />
  <link rel="stylesheet" href="/frontend/css/components.css" />
  <style>
    .messaging-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: calc(100vh - 73px);
      overflow: hidden;
    }

    .thread-panel {
      border-right: 1px solid var(--color-border);
      background: var(--color-surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .thread-panel-header {
      padding: var(--space-4) var(--space-5);
      border-bottom: 1px solid var(--color-border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .thread-panel-title {
      font-family: var(--font-display);
      font-size: var(--text-md);
      font-weight: var(--font-medium);
      color: var(--color-text);
    }

    #thread-list {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .chat-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--color-bg);
    }

    .chat-header {
      padding: var(--space-4) var(--space-6);
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface);
      display: none;
      align-items: center;
      gap: var(--space-3);
      flex-shrink: 0;
    }

    .chat-header-title {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: var(--font-medium);
      color: var(--color-text);
    }

    #chat-empty {
      display: flex;
      flex: 1;
      align-items: center;
      justify-content: center;
    }

    #chat-area {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    #messages-container {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      background: var(--color-bg);
    }

    #chat-input-area {
      display: none;
    }

    @media (max-width: 800px) {
      .messaging-layout {
        grid-template-columns: 1fr;
      }
      .thread-panel {
        display: none;
      }
    }
  </style>
</head>
<body>

<div id="app-shell" class="app-shell">
  <!-- Sidebar injected by nav.js -->
  <div class="main-content" style="overflow:hidden;">
    <div class="page-header">
      <div class="page-header-left">
        <h1 class="page-title">Messagerie</h1>
        <p class="page-subtitle">Communiquez avec votre co-parent et la famille</p>
      </div>
      <div class="page-header-actions">
        <button class="btn btn-primary btn-sm" id="btn-new-thread">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
          Nouveau fil
        </button>
      </div>
    </div>

    <div class="messaging-layout">
      <!-- Thread list -->
      <aside class="thread-panel">
        <div class="thread-panel-header">
          <span class="thread-panel-title">Conversations</span>
        </div>
        <div id="thread-list"></div>
      </aside>

      <!-- Chat area -->
      <section class="chat-panel">
        <!-- Chat header -->
        <div class="chat-header" id="chat-header">
          <div style="flex:1;min-width:0;">
            <div class="chat-header-title" id="chat-thread-title"></div>
          </div>
          <span class="badge badge-primary" id="chat-thread-badge"></span>
        </div>

        <!-- Empty state -->
        <div id="chat-empty">
          <div class="empty-state">
            <div class="empty-state-icon">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="28" height="28"><path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25" /></svg>
            </div>
            <div class="empty-state-title">Sélectionnez une conversation</div>
            <p class="empty-state-desc">Choisissez un fil de discussion dans la liste ou créez-en un nouveau.</p>
          </div>
        </div>

        <!-- Messages -->
        <div id="chat-area">
          <div id="messages-container"></div>
        </div>

        <!-- Message input -->
        <div class="message-input-area" id="chat-input-area">
          <textarea
            class="message-input"
            id="message-input"
            placeholder="Écrivez un message... (Entrée pour envoyer)"
            rows="1"
            aria-label="Message"
          ></textarea>
          <button class="btn btn-primary" id="send-btn" title="Envoyer" style="flex-shrink:0;padding:0.5rem 1rem;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" /></svg>
          </button>
        </div>
      </section>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<!-- New Thread Modal -->
<div class="modal-backdrop" id="thread-modal" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Nouvelle conversation</h2>
      <button class="modal-close-btn" onclick="closeModal('thread-modal')" aria-label="Fermer">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
      </button>
    </div>
    <form id="thread-form">
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="thread-subject">Sujet <span style="color:var(--color-text-muted);font-weight:400;">(optionnel)</span></label>
          <input class="form-input" type="text" id="thread-subject" placeholder="Ex : Organisation des vacances d'été" maxlength="120" />
        </div>
        <div class="form-group">
          <label class="form-label required" for="thread-type">Type de conversation</label>
          <select class="form-select" id="thread-type" required>
            <option value="parents">Entre parents</option>
            <option value="family">Famille entière</option>
          </select>
          <span class="form-hint">Détermine qui peut voir cette conversation</span>
        </div>
        <div class="form-group">
          <label class="form-label" for="thread-participants">Participants</label>
          <select class="form-select" id="thread-participants" multiple style="height: 120px;">
            <!-- populated by JS -->
          </select>
          <span class="form-hint">Maintenez Ctrl/Cmd pour sélectionner plusieurs personnes</span>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal('thread-modal')">Annuler</button>
        <button type="submit" class="btn btn-primary" id="thread-save-btn">Créer</button>
      </div>
    </form>
  </div>
</div>

<script src="/frontend/js/api.js"></script>
<script src="/frontend/js/auth.js"></script>
<script src="/frontend/js/ui.js"></script>
<script src="/frontend/js/nav.js"></script>
<script src="/frontend/js/inviter.js"></script>
<script src="/frontend/js/messagerie.js"></script>
<script>
(async function () {
  const user = await requireAuth();
  if (!user) return;
  renderNav('messagerie.html');
  await messageInit(user);
})();
</script>
</body>
</html>
