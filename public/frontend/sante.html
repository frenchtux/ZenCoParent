<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZenCoParent — Santé</title>
  <link rel="stylesheet" href="/frontend/css/design-system.css" />
  <link rel="stylesheet" href="/frontend/css/layout.css" />
  <link rel="stylesheet" href="/frontend/css/components.css" />
</head>
<body>

<div id="app-shell" class="app-shell">
  <!-- Sidebar injected by nav.js -->
  <div class="main-content">
    <div class="page-header">
      <div class="page-header-left">
        <h1 class="page-title">Santé</h1>
        <p class="page-subtitle">Antécédents médicaux et comptes-rendus</p>
      </div>
      <div class="page-header-actions">
        <button class="btn btn-primary btn-sm" id="btn-new-record">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
          Nouveau compte-rendu
        </button>
      </div>
    </div>
    <div class="page-body">

      <!-- Filter bar -->
      <div class="filter-bar" style="margin-top: var(--space-2);">
        <div class="form-group" style="flex-direction:row;align-items:center;gap:var(--space-2);margin:0;">
          <label class="form-label" style="white-space:nowrap;margin:0;" for="filter-child">Enfant</label>
          <select class="form-select" id="filter-child" style="width:auto;min-width:160px;">
            <option value="">Tous</option>
          </select>
        </div>
        <div class="form-group" style="flex-direction:row;align-items:center;gap:var(--space-2);margin:0;">
          <label class="form-label" style="white-space:nowrap;margin:0;" for="filter-practitioner">Praticien</label>
          <input class="form-input" type="text" id="filter-practitioner" placeholder="Filtrer…" style="width:auto;min-width:140px;" />
        </div>
        <div class="form-group" style="flex-direction:row;align-items:center;gap:var(--space-2);margin:0;">
          <label class="form-label" style="white-space:nowrap;margin:0;" for="filter-from">De</label>
          <input class="form-input" type="date" id="filter-from" style="width:auto;" />
        </div>
        <div class="form-group" style="flex-direction:row;align-items:center;gap:var(--space-2);margin:0;">
          <label class="form-label" style="white-space:nowrap;margin:0;" for="filter-to">À</label>
          <input class="form-input" type="date" id="filter-to" style="width:auto;" />
        </div>
        <button class="btn btn-ghost btn-sm" id="btn-clear-filters">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
          Effacer
        </button>
      </div>

      <!-- Table -->
      <div class="table-wrapper" style="margin-top: var(--space-4);">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Enfant</th>
              <th>Praticien</th>
              <th>Extrait du rapport</th>
              <th style="text-align:center;">PJ</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="records-table-body">
            <tr>
              <td colspan="6" style="text-align:center;padding:var(--space-8);">
                <div class="loading-state" style="display:inline-flex;">
                  <div class="spinner spinner-sm"></div><span>Chargement...</span>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<!-- Modal création -->
<div class="modal-backdrop" id="record-modal" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Nouveau compte-rendu</h2>
      <button class="modal-close-btn" onclick="closeModal('record-modal')" aria-label="Fermer">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
      </button>
    </div>
    <form id="record-form">
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label required" for="record-child">Enfant</label>
          <select class="form-select" id="record-child" required>
            <option value="">Sélectionner un enfant…</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label required" for="record-report">Rapport</label>
          <textarea class="form-textarea" id="record-report" rows="5" placeholder="Description du compte-rendu médical…" required></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="record-practitioner">Praticien</label>
            <input class="form-input" type="text" id="record-practitioner" placeholder="Dr Dupont…" />
          </div>
          <div class="form-group">
            <label class="form-label" for="record-date">Date</label>
            <input class="form-input" type="date" id="record-date" />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal('record-modal')">Annuler</button>
        <button type="submit" class="btn btn-primary" id="record-save-btn">Ajouter</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal détail -->
<div class="modal-backdrop" id="detail-modal" role="dialog" aria-modal="true">
  <div class="modal" style="max-width:640px;">
    <div class="modal-header">
      <h2 class="modal-title" id="detail-modal-title">Compte-rendu</h2>
      <button class="modal-close-btn" onclick="closeModal('detail-modal')" aria-label="Fermer">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
      </button>
    </div>
    <div class="modal-body">
      <div id="detail-meta" style="margin-bottom:var(--space-4);color:var(--color-text-muted);font-size:var(--text-sm);"></div>
      <div id="detail-report" style="white-space:pre-wrap;background:var(--color-bg-subtle,var(--color-bg));border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-4);font-size:var(--text-sm);line-height:1.6;margin-bottom:var(--space-6);"></div>

      <div style="margin-bottom:var(--space-2);font-weight:600;font-size:var(--text-sm);">Pièces jointes</div>
      <div id="detail-attachments" style="margin-bottom:var(--space-4);">
        <div class="loading-state" style="display:inline-flex;"><div class="spinner spinner-sm"></div><span>Chargement…</span></div>
      </div>

      <div style="border-top:1px solid var(--color-border);padding-top:var(--space-4);">
        <div style="margin-bottom:var(--space-2);font-weight:600;font-size:var(--text-sm);">Ajouter une pièce jointe</div>
        <div style="display:flex;gap:var(--space-2);align-items:center;flex-wrap:wrap;">
          <input type="file" id="attachment-file-input" style="flex:1;min-width:0;" />
          <button type="button" class="btn btn-primary btn-sm" id="btn-upload-attachment">Envoyer</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-ghost" onclick="closeModal('detail-modal')">Fermer</button>
    </div>
  </div>
</div>

<script src="/frontend/js/api.js"></script>
<script src="/frontend/js/auth.js"></script>
<script src="/frontend/js/ui.js"></script>
<script src="/frontend/js/nav.js"></script>
<script src="/frontend/js/inviter.js"></script>
<script src="/frontend/js/sante.js"></script>
<script>
(async function () {
  const user = await requireAuth();
  if (!user) return;
  renderNav('sante.html');
  await santeInit(user);
})();
</script>
</body>
</html>
