<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZenCoParent — Détail famille</title>
  <link rel="stylesheet" href="/frontend/css/design-system.css" />
  <link rel="stylesheet" href="/frontend/css/layout.css" />
  <link rel="stylesheet" href="/frontend/css/components.css" />
</head>
<body>

<div id="app-shell" class="app-shell">
  <div class="main-content">
    <div class="page-header">
      <div class="page-header-left">
        <a href="/frontend/admin.html" class="btn btn-ghost btn-sm" style="margin-bottom:var(--space-2);">← Retour</a>
        <h1 class="page-title" id="page-title">Famille</h1>
        <p class="page-subtitle" id="page-subtitle"></p>
      </div>
    </div>
    <div class="page-body">
      <div id="loading-state" class="loading-state"><div class="spinner"></div><span>Chargement...</span></div>
      <div id="family-detail" style="display:none;">

        <div class="grid-2">
          <!-- Subscription info -->
          <div class="card">
            <div class="card-header"><h2 class="card-title">Abonnement</h2></div>
            <div class="card-body" id="sub-info"></div>
          </div>

          <!-- Module overrides -->
          <div class="card">
            <div class="card-header">
              <h2 class="card-title">Modules</h2>
              <small class="text-muted">Override admin (null = plan)</small>
            </div>
            <div class="card-body">
              <div style="display:flex;flex-direction:column;gap:var(--space-3);" id="module-toggles"></div>
              <div style="margin-top:var(--space-4);display:flex;gap:var(--space-3);">
                <button class="btn btn-primary btn-sm" id="save-modules">Enregistrer</button>
                <button class="btn btn-ghost btn-sm" id="reset-modules">Réinitialiser (plan)</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Payments history -->
        <div class="card" style="margin-top:var(--space-6);">
          <div class="card-header"><h2 class="card-title">Historique paiements</h2></div>
          <div class="card-body" style="padding:0;">
            <table class="table">
              <thead>
                <tr><th>Date</th><th>Type</th><th>Montant</th><th>Statut</th></tr>
              </thead>
              <tbody id="payments-tbody"></tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="/frontend/js/api.js"></script>
<script src="/frontend/js/auth.js"></script>
<script src="/frontend/js/ui.js"></script>
<script src="/frontend/js/nav.js"></script>
<script src="/frontend/js/admin-famille.js"></script>
</body>
</html>
