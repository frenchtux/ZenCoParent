<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZenCoParent — Paramètres</title>
  <link rel="stylesheet" href="/frontend/css/design-system.css" />
  <link rel="stylesheet" href="/frontend/css/layout.css" />
  <link rel="stylesheet" href="/frontend/css/components.css" />
</head>
<body>

<div id="app-shell" class="app-shell">
  <div class="main-content">
    <div class="page-header">
      <div class="page-header-left">
        <a href="/frontend/admin.html" class="btn btn-ghost btn-sm" style="margin-bottom:var(--space-2);">← Retour</a>
        <h1 class="page-title">Paramètres</h1>
        <p class="page-subtitle">Configuration de votre espace famille</p>
      </div>
    </div>
    <div class="page-body">

      <!-- Mail config -->
      <div class="card" style="max-width:640px;">
        <div class="card-header">
          <h2 class="card-title">Configuration e-mail (SMTP)</h2>
          <p class="card-subtitle" style="margin:0;color:var(--color-text-muted);font-size:var(--text-sm)">
            Paramètres utilisés pour l'envoi des notifications et invitations.
          </p>
        </div>
        <div class="card-body">
          <div id="mail-alert" style="display:none;margin-bottom:var(--space-4);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);font-size:var(--text-sm);"></div>

          <form id="mail-form" novalidate>
            <div class="grid-2" style="gap:var(--space-4);margin-bottom:var(--space-4);">
              <div class="form-group">
                <label class="form-label" for="mail-host">Serveur SMTP (host)</label>
                <input class="form-input" type="text" id="mail-host" placeholder="smtp.example.com" />
              </div>
              <div class="form-group">
                <label class="form-label" for="mail-port">Port</label>
                <input class="form-input" type="number" id="mail-port" placeholder="587" min="1" max="65535" />
              </div>
            </div>

            <div class="grid-2" style="gap:var(--space-4);margin-bottom:var(--space-4);">
              <div class="form-group">
                <label class="form-label" for="mail-username">Nom d'utilisateur</label>
                <input class="form-input" type="text" id="mail-username" placeholder="user@example.com" autocomplete="off" />
              </div>
              <div class="form-group">
                <label class="form-label" for="mail-password">Mot de passe</label>
                <input class="form-input" type="password" id="mail-password" placeholder="Laisser vide pour conserver" autocomplete="new-password" />
              </div>
            </div>

            <div class="form-group" style="margin-bottom:var(--space-4);">
              <label class="form-label" for="mail-encryption">Chiffrement</label>
              <select class="form-select" id="mail-encryption">
                <option value="tls">TLS (STARTTLS — port 587)</option>
                <option value="ssl">SSL (port 465)</option>
                <option value="none">Aucun (non recommandé)</option>
              </select>
            </div>

            <div class="grid-2" style="gap:var(--space-4);margin-bottom:var(--space-6);">
              <div class="form-group">
                <label class="form-label" for="mail-from-address">Adresse expéditeur</label>
                <input class="form-input" type="email" id="mail-from-address" placeholder="noreply@example.com" />
              </div>
              <div class="form-group">
                <label class="form-label" for="mail-from-name">Nom expéditeur</label>
                <input class="form-input" type="text" id="mail-from-name" placeholder="ZenCoParent" />
              </div>
            </div>

            <div style="display:flex;gap:var(--space-3);flex-wrap:wrap;align-items:center;">
              <button type="submit" class="btn btn-primary" id="save-btn">Enregistrer</button>
              <button type="button" class="btn btn-secondary" id="test-btn">Envoyer un test…</button>
            </div>
          </form>
        </div>
      </div>

    </div><!-- /page-body -->
  </div><!-- /main-content -->
</div><!-- /app-shell -->

<!-- Test mail modal -->
<div id="test-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;">
  <div style="background:var(--color-surface);border-radius:var(--radius-xl);padding:var(--space-8);width:100%;max-width:400px;box-shadow:var(--shadow-xl);">
    <h3 style="margin:0 0 var(--space-4);">Envoyer un e-mail de test</h3>
    <div id="test-error" style="display:none;color:var(--color-error,#dc2626);font-size:var(--text-sm);margin-bottom:var(--space-3);"></div>
    <div class="form-group" style="margin-bottom:var(--space-4);">
      <label class="form-label required" for="test-to">Adresse de destination</label>
      <input class="form-input" type="email" id="test-to" placeholder="you@example.com" />
    </div>
    <div style="display:flex;gap:var(--space-3);">
      <button type="button" class="btn btn-primary" id="test-send-btn">Envoyer</button>
      <button type="button" class="btn btn-ghost" id="test-cancel-btn">Annuler</button>
    </div>
  </div>
</div>

<script src="/frontend/js/api.js"></script>
<script src="/frontend/js/auth.js"></script>
<script src="/frontend/js/nav.js"></script>
<script>
(async () => {
  'use strict';

  const user = await requireAuth();
  if (!user) return;
  if (user.role !== 'admin') { window.location.href = '/frontend/dashboard.html'; return; }

  renderNav('admin-parametres.html');

  const showAlert = (msg, type = 'success') => {
    const el = document.getElementById('mail-alert');
    el.textContent = msg;
    el.style.display = '';
    el.style.background = type === 'success' ? 'var(--color-success-bg, #d1fae5)' : 'var(--color-error-bg, #fee2e2)';
    el.style.color = type === 'success' ? 'var(--color-success, #065f46)' : 'var(--color-error, #dc2626)';
    setTimeout(() => { el.style.display = 'none'; }, 5000);
  };

  // ── Load current config ──────────────────────────────────────────────────
  try {
    const r = await api.get('/admin/settings/mail');
    if (r && r.data) {
      const d = r.data;
      document.getElementById('mail-host').value        = d.mail_host        || '';
      document.getElementById('mail-port').value        = d.mail_port        || '587';
      document.getElementById('mail-username').value    = d.mail_username    || '';
      // password shown as empty (placeholder)
      document.getElementById('mail-encryption').value  = d.mail_encryption  || 'tls';
      document.getElementById('mail-from-address').value= d.mail_from_address|| '';
      document.getElementById('mail-from-name').value   = d.mail_from_name   || 'ZenCoParent';
    }
  } catch (e) {
    showAlert('Impossible de charger la configuration : ' + e.message, 'error');
  }

  // ── Save ─────────────────────────────────────────────────────────────────
  document.getElementById('mail-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('save-btn');
    btn.disabled = true; btn.textContent = 'Enregistrement…';

    const payload = {
      mail_host:         document.getElementById('mail-host').value.trim(),
      mail_port:         document.getElementById('mail-port').value.trim() || '587',
      mail_username:     document.getElementById('mail-username').value.trim(),
      mail_encryption:   document.getElementById('mail-encryption').value,
      mail_from_address: document.getElementById('mail-from-address').value.trim(),
      mail_from_name:    document.getElementById('mail-from-name').value.trim(),
    };
    const pwd = document.getElementById('mail-password').value;
    if (pwd) payload.mail_password = pwd;

    try {
      await api.put('/admin/settings/mail', payload);
      showAlert('Configuration enregistrée.', 'success');
      document.getElementById('mail-password').value = '';
    } catch (err) {
      showAlert('Erreur : ' + (err.message || 'Enregistrement impossible.'), 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Enregistrer';
    }
  });

  // ── Test modal ────────────────────────────────────────────────────────────
  const overlay = document.getElementById('test-overlay');
  document.getElementById('test-btn').addEventListener('click', () => {
    overlay.style.display = 'flex';
    document.getElementById('test-to').focus();
  });
  document.getElementById('test-cancel-btn').addEventListener('click', () => {
    overlay.style.display = 'none';
    document.getElementById('test-error').style.display = 'none';
  });
  document.getElementById('test-send-btn').addEventListener('click', async () => {
    const to   = document.getElementById('test-to').value.trim();
    const errEl = document.getElementById('test-error');
    errEl.style.display = 'none';

    if (!to) { errEl.textContent = 'Adresse requise.'; errEl.style.display = ''; return; }

    const btn = document.getElementById('test-send-btn');
    btn.disabled = true; btn.textContent = 'Envoi…';
    try {
      const r = await api.post('/admin/settings/mail/test', { to });
      if (r && r.success) {
        overlay.style.display = 'none';
        showAlert('Email de test envoyé à ' + to + '.', 'success');
      } else {
        errEl.textContent = (r && r.error) || 'Erreur inconnue.'; errEl.style.display = '';
      }
    } catch (err) {
      errEl.textContent = err.message || 'Erreur lors de l\'envoi.'; errEl.style.display = '';
    } finally {
      btn.disabled = false; btn.textContent = 'Envoyer';
    }
  });
})();
</script>
</body>
</html>
